name: ReleaseBuild

on:
  push:
    tags:
      - '*'

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  VCPKG_ROOT: ${{ github.workspace }}\vcpkg
  VCPKG_DISABLE_METRICS: 1


permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            build_dir: Win32
            artifact_name: Build-Win32-Release
          - platform: x64
            build_dir: x64
            artifact_name: Build-x64-Release

    steps:
    - uses: actions/checkout@v6

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Bootstrap vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
        & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

    - uses: actions/cache@v5
      id: cache
      with:
        path: vcpkg_binary_cache\
        key: ${{ runner.os }}-${{ env.BUILD_CONFIGURATION }}-${{ matrix.platform }}-binarycache-${{ hashFiles('vcpkg.json') }}

    - name: Create vcpkg binary cache directory
      shell: pwsh
      run: |
        $env:VCPKG_DEFAULT_BINARY_CACHE="$env:GITHUB_WORKSPACE\vcpkg_binary_cache"
        New-Item -Type Directory -Force "$env:VCPKG_DEFAULT_BINARY_CACHE"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_DEFAULT_BINARY_CACHE" >> $env:GITHUB_ENV
        echo "VCPKG_INSTALLATION_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV

    - name: Vcpkg integrate
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        & "$env:VCPKG_ROOT\vcpkg.exe" integrate install

    - name: Build ${{ matrix.platform }}
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{ matrix.platform }} ${{env.SOLUTION_FILE_PATH}}

    - name: Upload build output
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: Build\${{ matrix.build_dir }}\${{ env.BUILD_CONFIGURATION }}\

  package:
    name: Package Release build
    runs-on: windows-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Download x86 build output
      uses: actions/download-artifact@v6
      with:
        name: Build-Win32-Release
        path: Build\Win32\${{ env.BUILD_CONFIGURATION }}\

    - name: Download x64 build output
      uses: actions/download-artifact@v6
      with:
        name: Build-x64-Release
        path: Build\x64\${{ env.BUILD_CONFIGURATION }}\

    - name: Copy files
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        .\copyFiles.ps1

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ReleaseBuild
        path: ReleaseBuild\
