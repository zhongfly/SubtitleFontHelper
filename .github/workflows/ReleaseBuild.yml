name: ReleaseBuild

on:
  push:
    tags:
      - '*'

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  VCPKG_ROOT: ${{ github.workspace }}\vcpkg
  VCPKG_DISABLE_METRICS: 1


permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            triplet: x86-windows-static-md
            build_dir: Win32
            artifact_name: Build-Win32-Release
          - platform: x64
            triplet: x64-windows-static-md
            build_dir: x64
            artifact_name: Build-x64-Release

    steps:
    - uses: actions/checkout@v6

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Bootstrap vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
        & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

    - uses: actions/cache@v5
      id: cache
      with:
        path: |
          vcpkg_binary_cache\
          vcpkg_installed\${{ matrix.triplet }}\
        key: ${{ runner.os }}-${{ matrix.triplet }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: ${{ runner.os }}-${{ matrix.triplet }}-vcpkg-

    - name: Prepare vcpkg directories
      shell: pwsh
      run: |
        $env:VCPKG_DEFAULT_BINARY_CACHE="$env:GITHUB_WORKSPACE\vcpkg_binary_cache"
        $tripletInstallRoot="$env:GITHUB_WORKSPACE\vcpkg_installed\${{ matrix.triplet }}"
        New-Item -Type Directory -Force "$env:VCPKG_DEFAULT_BINARY_CACHE"
        New-Item -Type Directory -Force $tripletInstallRoot
        echo "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_DEFAULT_BINARY_CACHE" >> $env:GITHUB_ENV
        echo "VCPKG_INSTALLATION_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV

    - name: Vcpkg integrate
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        & "$env:VCPKG_ROOT\vcpkg.exe" integrate install

    - name: Install vcpkg dependencies
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        $tripletInstallRoot="$env:GITHUB_WORKSPACE\vcpkg_installed\${{ matrix.triplet }}"
        & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet ${{ matrix.triplet }} --x-install-root="$tripletInstallRoot"

    - name: Build ${{ matrix.platform }}
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{ matrix.platform }} /p:VcpkgManifestInstall=false ${{env.SOLUTION_FILE_PATH}}

    - name: Upload build output
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: Build\${{ matrix.build_dir }}\${{ env.BUILD_CONFIGURATION }}\

  package:
    name: Package Release build
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download x86 build output
      uses: actions/download-artifact@v7
      with:
        name: Build-Win32-Release
        path: Build\Win32\${{ env.BUILD_CONFIGURATION }}\

    - name: Download x64 build output
      uses: actions/download-artifact@v7
      with:
        name: Build-x64-Release
        path: Build\x64\${{ env.BUILD_CONFIGURATION }}\

    - name: Copy files
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        .\copyFiles.ps1

    - name: Create release archive
      id: archive
      shell: pwsh
      run: |
        $archiveName = "SubtitleFontHelper-$env:GITHUB_REF_NAME.zip"
        $archivePath = Join-Path $env:GITHUB_WORKSPACE $archiveName
        if (Test-Path $archivePath)
        {
          Remove-Item -LiteralPath $archivePath -Force
        }

        Compress-Archive -Path ReleaseBuild\* -DestinationPath $archivePath -CompressionLevel Optimal

        "archive_name=$archiveName" >> $env:GITHUB_OUTPUT
        "archive_path=$archivePath" >> $env:GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.archive.outputs.archive_name }}
        path: ${{ steps.archive.outputs.archive_path }}

    - name: Publish draft release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifactErrorsFailBuild: true
        artifacts: ${{ steps.archive.outputs.archive_path }}
        draft: true
        tag: ${{ github.ref_name }}
        updateOnlyUnreleased: true
